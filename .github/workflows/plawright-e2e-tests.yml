name: Playwright Tests

on:
  pull_request: 
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      rolnopol:
        image: jaktestowac/rolnopol:latest
        ports:
          - 3000:3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-browsers-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-browsers-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Wait for service to be ready
        # Polls port 3000 every 2 seconds for up to 60 seconds (30 attempts x 2s)
        run: |
          echo "Waiting for service on port 3000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Service is ready."
              exit 0
            fi
            echo "Attempt $i/30 - retrying in 2s..."
            sleep 2
          done
          echo "Service did not become ready in time." >&2
          exit 1
      - name: Install Playwright browser system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npm test

      # Step name shown in the GitHub Actions UI
      - name: Upload Playwright report
        # Run this step when tests pass or fail, but skip on cancellation
        if: success() || failure()
        # Use the official GitHub action for uploading build/test artifacts
        uses: actions/upload-artifact@v4
        with:
          # Name of the artifact bundle as it will appear in the workflow run summary
          # Includes run ID and attempt number to avoid collisions on re-runs
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          # Paths to include in the artifact; both the HTML report and raw test results (traces, screenshots, videos)
          path: |
            playwright-report/
          # Number of days GitHub will keep the artifact before automatically deleting it
          retention-days: 14
