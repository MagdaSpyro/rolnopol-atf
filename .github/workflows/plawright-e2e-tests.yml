name: Playwright E2E Tests

# Trigger: run this workflow on every pull_request event (opened, synchronised, or reopened)
# No branch filter is applied, so it covers PRs targeting any branch.
on:
  pull_request:

jobs:
  e2e-tests:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    # Restrict the GITHUB_TOKEN to the minimum permissions this job requires
    permissions:
      contents: read

    steps:
      # Check out the repository code so the workflow can access project files
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the Node.js runtime that matches the project's requirement (v18+)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # Install all npm dependencies declared in package.json / package-lock.json
      - name: Install dependencies
        run: npm ci

      # Download the Playwright browser binaries required to run the tests
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Execute the full Playwright test suite; the HTML report is generated automatically
      # because playwright.config.ts sets reporter: [['html', { open: 'never' }]]
      - name: Run Playwright tests
        run: npm test

      # Upload the generated HTML report as a workflow artifact so it can be
      # downloaded and reviewed directly from the GitHub Actions run summary page.
      # The report is uploaded even when tests fail so failures can still be analysed.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
