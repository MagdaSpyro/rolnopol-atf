name: Playwright Tests

on:
  pull_request: 

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      rolnopol:
        image: jaktestowac/rolnopol:latest
        ports:
          - 3000:3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npm test

      # Step name shown in the GitHub Actions UI
      - name: Upload Playwright report
        # Run this step even if previous steps (e.g. tests) failed
        if: always()
        # Use the official GitHub action for uploading build/test artifacts
        uses: actions/upload-artifact@v4
        with:
          # Name of the artifact bundle as it will appear in the workflow run summary
          name: playwright-report
          # Paths to include in the artifact; both the HTML report and raw test results (traces, screenshots, videos)
          path: |
            playwright-report/
          # Number of days GitHub will keep the artifact before automatically deleting it
          retention-days: 30
